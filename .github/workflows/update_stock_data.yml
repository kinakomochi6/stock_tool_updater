name: Update Stock Data

on:
  push:
    branches:
      - main
  schedule:
    # 毎日深夜0時(JST) = 15:00 UTC に自動実行
    - cron: '0 15 * * *'
  workflow_dispatch: # 手動実行用ボタンを追加

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 1つのShardが失敗しても他のShardを止めない
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7] # 8分割して並行実行
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 必要なライブラリ群をインストール
          pip install firebase-admin yfinance requests beautifulsoup4 lxml pandas numpy openpyxl
          
          # もしrequirements.txtが必要な場合は以下のようにもできます（今回は明記）
          # pip install -r webapp/requirements.txt

      - name: Run Scraper
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          # webappディレクトリに移動（不要）
          # cd webapp（不要）
          
          # SecretsからFirebaseの認証キーJSONを生成
          echo "$FIREBASE_CREDENTIALS" > firebase_key.json
          
          # 8分割したうちの、自分のShard Indexを担当するバッチを実行
          python firebase_master_test.py --total-shards 8 --shard-index ${{ matrix.shard }}
